name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install and prune heavy packages
        run: |
          npm ci
          # Remove Remotion native binaries that bloat the deployment and
          # cause the SWA warm-up health check to time out (~92 MB saved).
          # The export API route handles their absence gracefully.
          rm -rf node_modules/@remotion/compositor-linux-x64-gnu \
                 node_modules/@remotion/compositor-linux-x64-musl \
                 node_modules/@remotion/renderer \
                 node_modules/@remotion/bundler \
                 node_modules/@remotion/cli \
                 node_modules/@remotion/studio \
                 node_modules/@remotion/studio-server \
                 node_modules/@remotion/web-renderer
          npx next build
      - name: Build And Deploy
        id: builddeploy
        timeout-minutes: 60
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_OCEAN_00EB0A103 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "" # Let SWA auto-detect Next.js output
          skip_app_build: true # Already built in the previous step
          ###### End of Repository/Build Configurations ######
        env:
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_FOUNDRY_RESOURCE: ${{ secrets.ANTHROPIC_FOUNDRY_RESOURCE }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_OCEAN_00EB0A103 }}
          action: "close"
